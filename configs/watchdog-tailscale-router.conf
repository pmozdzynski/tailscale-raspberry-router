# Managed by tailscale-raspberry-router
watchdog-device = /dev/watchdog
watchdog-timeout = 60
interval = 10
realtime = yes
priority = 1

# Reboot if load is extreme (Pi-friendly threshold)
max-load-1 = 24

# Custom health check: services, routing, IP forwarding
test-binary = /usr/local/bin/router-health-check.sh
test-timeout = 30

# Repair attempt before reboot (same script tries service restarts)
repair-binary = /usr/local/bin/router-health-check.sh
repair-timeout = 30
